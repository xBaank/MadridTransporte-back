name: Publish Docker image And Deploy

on:
  push:
    tags: [ "*" ]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for api
        id: meta_api
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: xbank/bus_tracker_api

      - name: Build and push Docker image for api
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          context: .
          file: Dockerfile-api
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract metadata (tags, labels) for loader
        id: meta_loader
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: xbank/bus_tracker_loader

      - name: Build and push Docker image for loader
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          context: .
          file: Dockerfile-loader
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta_loader.outputs.tags }}
          labels: ${{ steps.meta_loader.outputs.labels }}

